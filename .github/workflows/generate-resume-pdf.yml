name: Generate Resume PDF

on:
  deployment_status:
  workflow_dispatch:

env:
  PDF_FILENAME: Fabricio_Pirini_CV.pdf
  BASE_URL: https://fabriciopirini.com

jobs:
  generate-pdf:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright deps
        run: bunx playwright install-deps chromium

      - name: Install PDF fonts
        run: |
          sudo apt-get install -y -qq fonts-roboto
          mkdir -p ~/.local/share/fonts
          curl -sL "https://github.com/google/fonts/raw/main/ofl/sourcesans3/SourceSans3%5Bwght%5D.ttf" -o ~/.local/share/fonts/SourceSans3.ttf
          curl -sL "https://github.com/google/fonts/raw/main/ofl/sourcesans3/SourceSans3-Italic%5Bwght%5D.ttf" -o ~/.local/share/fonts/SourceSans3-Italic.ttf
          fc-cache -f

      - name: Generate PDF
        run: |
          cat << 'SCRIPT' > generate-pdf.js
          const { chromium } = require('@playwright/test');

          (async () => {
            const browser = await chromium.launch({
              channel: 'chrome',
              args: ['--font-render-hinting=none'],
            });
            const context = await browser.newContext({ viewport: { width: 794, height: 1123 }, deviceScaleFactor: 2 });
            const page = await context.newPage();
            await page.emulateMedia({ media: 'print' });
            await page.goto(process.env.BASE_URL + '/resume', { waitUntil: 'networkidle' });
            await page.evaluate(() => document.fonts.ready);

            const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            await page.pdf({
              path: process.env.PDF_FILENAME,
              format: 'A4',
              printBackground: false,
              displayHeaderFooter: true,
              headerTemplate: '<span></span>',
              footerTemplate: `
                <div style="width: 100%; font-size: 9pt; color: #6b7280; padding: 0 2cm; display: flex; justify-content: space-between; font-family: 'Source Sans 3', sans-serif;">
                  <span>${date}</span>
                  <span>Fabricio Tramontano Pirini &bull; Resume</span>
                  <span><span class="pageNumber"></span> / <span class="totalPages"></span></span>
                </div>
              `,
              margin: { top: '2cm', bottom: '2cm', left: '2cm', right: '2cm' },
            });

            await browser.close();
          })().catch(err => { console.error(err); process.exit(1); });
          SCRIPT
          node generate-pdf.js

      - name: Checkout utils repo
        uses: actions/checkout@v6
        with:
          repository: fabriciopirini/utils
          token: ${{ secrets.UTILS_REPO_PAT }}
          path: utils-repo

      - name: Commit and push PDF
        run: |
          cp "$PDF_FILENAME" "utils-repo/Resume/$PDF_FILENAME"
          cd utils-repo
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "Resume/$PDF_FILENAME"
          git diff --cached --quiet || git commit -m 'chore: update resume PDF from deploy ${{ github.sha }}'
          git push
